name: "🐛 Bug"
description: "버그 수정"
title: "[Bug] "
labels:
  - bug

body:
  - type: textarea
    id: bug_description
    attributes:
      label: 🐛 버그 설명
      description: 어떤 문제가 발생했는지 작성해 주세요.
      placeholder: 발생한 버그를 자세히 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 🔁 재현 방법
      description: 버그를 재현하는 방법을 작성해 주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 🎯 기대 동작
      description: 원래 기대했던 동작을 작성해 주세요.
      placeholder: 정상적으로는 어떻게 동작해야 하나요?
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: ✅ 작업할 내용
      description: 수정할 내용을 체크박스 형태로 작성해 주세요.
      placeholder: |
        - [ ] 원인 분석
        - [ ] 버그 수정
        - [ ] 테스트
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 🙋🏻 참고 자료
      description: 참고 자료가 있다면 작성해 주세요.
      placeholder: 로그, 스크린샷 등을 첨부해 주세요.